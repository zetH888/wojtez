<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WH40K Faction Roulette</title>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;700&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <script>
        // Framer Motion global mapping
        window.Motion = window.Motion || window.framerMotion;

        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        grimdark: '#0a0a0a',
                        iron: '#2a2a2a',
                        gold: '#c5a059',
                        blood: '#8b0000',
                        rust: '#b7410e',
                    },
                    fontFamily: {
                        gothic: ['Cinzel', 'serif'],
                        body: ['Crimson Text', 'serif'],
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>
    <div class="scanlines"></div>
    <div class="crt-flicker"></div>
    <div id="sparks-container"></div>

    <script type="text/babel" src="app.js"></script>
</body>
</html>
